# ScanSettingBinding for HCP control plane compliance scanning
# This should be applied on the Management Cluster after creating
# the TailoredProfile for your specific Hosted Cluster.
#
# Before applying:
# 1. Create the TailoredProfile (e.g., tailoredprofile-cis-hcp.yaml)
# 2. Update the profile reference below to match your TailoredProfile name
#
# For more information, see:
# https://github.com/ComplianceAsCode/compliance-operator/blob/master/doc/usage.md#how-to-use-compliance-operator-with-hypershift-management-cluster
apiVersion: compliance.openshift.io/v1alpha1
kind: ScanSettingBinding
metadata:
  name: cis-compliance-hcp-example
  namespace: openshift-compliance
profiles:
  - name: cis-compliance-hcp-example
    kind: TailoredProfile
    apiGroup: compliance.openshift.io/v1alpha1
settingsRef:
  name: default
  kind: ScanSetting
  apiGroup: compliance.openshift.io/v1alpha1
