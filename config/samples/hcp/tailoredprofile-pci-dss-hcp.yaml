# TailoredProfile for PCI-DSS compliance scanning of HCP control plane
# This profile should be applied on the Management Cluster to scan
# the control plane components of a specific Hosted Cluster.
#
# Before applying, update the following values:
# - metadata.name: Unique name for this tailored profile
# - ocp4-hypershift-cluster: Name of your Hosted Cluster
# - ocp4-hypershift-namespace-prefix: Namespace prefix where the Hosted Cluster resides
#
# For more information, see:
# https://github.com/ComplianceAsCode/compliance-operator/blob/master/doc/usage.md#how-to-use-compliance-operator-with-hypershift-management-cluster
apiVersion: compliance.openshift.io/v1alpha1
kind: TailoredProfile
metadata:
  name: pci-dss-compliance-hcp-example
  namespace: openshift-compliance
  annotations:
    compliance.openshift.io/product-type: Platform
    compliance.openshift.io/hcp-target: "true"
spec:
  title: PCI-DSS Benchmark for HCP Control Plane
  description: |
    PCI-DSS Benchmark for Hosted Control Plane components.
    This profile scans the control plane of a specific Hosted Cluster
    running on this management cluster.
  extends: ocp4-pci-dss
  setValues:
    - name: ocp4-hypershift-cluster
      value: "my-hosted-cluster"
      rationale: Name of the target Hosted Cluster to scan
    - name: ocp4-hypershift-namespace-prefix
      value: "clusters"
      rationale: Namespace prefix where the Hosted Cluster control plane resides
